<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorator="identity/layout" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${'Other Learning - ' + identity.email}"></title>
</head>
<body>
<section layout:fragment="identity-content">
    <a href=""></a>
    <h2 class="pb-3">Other Learning</h2>
    <form autocomplete="off" th:action="@{/identities/update/{uid}/other-learning(uid=${identity.uid})}" method="get">
        <div class="form-row pb-3">
            <div class="col-9">
                <label for="query" class="sr-only">Course title</label>
                <input type="text" class="form-control mr-sm-2" id="query" name="query"
                       placeholder="Course title to lookup" th:value="${query}" required="required"/>
            </div>
            <div class="col">
                <button type="submit" class="btn btn-primary btn-contrast-fix">Search</button>
                <a class="btn btn-danger" th:href="@{/identities/update/{uid}/other-learning(uid=${identity.uid})}">Reset</a>
                <form autocomplete="off" th:action="@{/identities/update/{uid}/other-learning(uid=${identity.uid})}" method="get">
                    <a th:if="${sort == 'ASC'}" th:href="@{/identities/update/{uid}/other-learning(uid=${identity.uid}, query=${query}, sort='DESC')}" aria-label="Sort Z to A"
                       class="pt-8 pb-8 pl-2 pr-2 btn btn-outline-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-sort-alpha-down" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M10.082 5.629 9.664 7H8.598l1.789-5.332h1.234L13.402 7h-1.12l-.419-1.371zm1.57-.785L11 2.687h-.047l-.652 2.157z"/>
                            <path d="M12.96 14H9.028v-.691l2.579-3.72v-.054H9.098v-.867h3.785v.691l-2.567 3.72v.054h2.645zM4.5 2.5a.5.5 0 0 0-1 0v9.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L4.5 12.293z"/>
                        </svg>
                        <span class="sr-only">Sort Z to A</span>
                    </a>
                    <a th:if="${sort == 'DESC'}" th:href="@{/identities/update/{uid}/other-learning(uid=${identity.uid}, query=${query}, sort='ASC')}" aria-label="Sort A to Z"
                       class="pt-8 pb-8 pl-2 pr-2 btn btn-outline-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-sort-alpha-down-alt" viewBox="0 0 16 16">
                            <path d="M12.96 7H9.028v-.691l2.579-3.72v-.054H9.098v-.867h3.785v.691l-2.567 3.72v.054h2.645z"/>
                            <path fill-rule="evenodd" d="M10.082 12.629 9.664 14H8.598l1.789-5.332h1.234L13.402 14h-1.12l-.419-1.371zm1.57-.785L11 9.688h-.047l-.652 2.156z"/>
                            <path d="M4.5 2.5a.5.5 0 0 0-1 0v9.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L4.5 12.293z"/>
                        </svg>
                        <span class="sr-only">Sort A to Z</span>
                    </a>
                </form>
            </div>
        </div>
    </form>
    <p th:if="${#lists.isEmpty(learningCourses)}">
        No other learning found.
    </p>
    <p th:unless="${#lists.isEmpty(learningCourses)}" role="status" th:text="${totalResults} + ' results'"></p>
    <div class="table-responsive pb-4" th:if="${!#lists.isEmpty(learningCourses)}">
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Course title</th>
                    <th>Status</th>
                    <th>Date completed</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${learningCourses}">
                    <td><a th:href="@{/identities/update/{uid}/other-learning/{courseId}(uid=${identity.uid}, courseId=${course.resourceId})}" th:text="${course.title}"></a></td>
                    <td th:text="${course.getDisplayStatus()}"></td>
                    <td th:text="${course.completionDate != null ? course.completionDate : ''}"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <nav aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <th:block th:each="ins: ${pagination}">
                <li class="page-item disabled">
                    <a th:if="${currentPage == ins.value || ins.key == '...'}" class="page-link page-link-contrast-fix"
                       th:text="${ins.key}"></a>
                </li>
                <li class="page-item">
                    <a th:unless="${currentPage == ins.value || ins.key == '...'}" class="page-link page-link-contrast-fix"
                       th:href="${#strings.isEmpty(query)}
                        ? @{/identities/update/{uid}/other-learning(uid=${identity.uid}, page=${ins.value}, sort=${sort})}
                        : @{/identities/update/{uid}/other-learning(uid=${identity.uid}, page=${ins.value}, query=${query}, sort=${sort})}"
                       th:text="${ins.key}"></a>
                </li>
            </th:block>
        </ul>
    </nav>
</section>
</body>
</html>
