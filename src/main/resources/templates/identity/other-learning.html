<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorator="identity/layout" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${'Other Learning - ' + identity.email}"></title>
</head>
<body>
<section layout:fragment="identity-content">
    <h2 class="pb-3">Other Learning</h2>
    <div class="table-responsive pb-4">
        <table class="table table-striped table-bordered">
            <thead>
            <tr>
                <th>Course title</th>
                <th>Status</th>
                <th>Date completed</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${learningCourses}">
                <td><a th:href="'#' + ${course.resourceId}" th:text="${course.title}"></a></td>
                <td th:text="${course.status}"></td>
                <td th:text="${course.completionDate != null ? course.completionDate : ''}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(learningCourses)}">
                <td colspan="3" class="text-center">No other learning records found.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <nav aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <th:block th:each="ins: ${pagination}">
                <li class="page-item disabled">
                    <a th:if="${currentPage == ins.value || ins.key == '...'}" class="page-link page-link-contrast-fix"
                       th:text="${ins.key}"></a>
                </li>
                <li class="page-item">
                    <a th:unless="${currentPage == ins.value || ins.key == '...'}" class="page-link page-link-contrast-fix"
                       th:href="@{/identities/update/{uid}/other-learning(uid=${identity.uid}, page=${ins.value})}"
                       th:text="${ins.key}"></a>
                </li>
            </th:block>
        </ul>
    </nav>
</section>
</body>
</html>
