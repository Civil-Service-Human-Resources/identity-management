<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorator="layout" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${'View Identity - ' + identity.email}"></title>
</head>
<body>
<section layout:fragment="content">
    <a href="/mgmt/identities" class="btn btn-link-contrast-fix pl-0">Back</a>

    <h1 class="pb-5" th:text="${'View Identity - ' + identity.email}"></h1>
    <div th:if="${status}" class="alert alert-danger" role="alert">
        <h4 class="alert-heading">There was a problem</h4>
        <p th:text="${status}">status ...</p>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}">success</div>

    <ul class="nav nav-pills mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'profile'} ? 'active' : ''" th:href="@{|/identities/update/${identity.uid}|}">Profile</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'required-learning'} ? 'active' : ''" th:href="@{|/identities/update/${identity.uid}/required-learning|}">Required learning</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'other-learning'} ? 'active' : ''" th:href="@{|/identities/update/${identity.uid}/other-learning|}">Other learning</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'other-organisation-access'} ? 'active' : ''" th:href="@{|/identities/update/${identity.uid}/other-organisation-access|}">Other organisation access</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'roles'} ? 'active' : ''" th:href="@{|/identities/update/${identity.uid}/roles|}">Roles</a>
        </li>
    </ul>

    <div class="border p-4 rounded">
        <section layout:fragment="identity-content">
            <p>Content goes here</p>
        </section>
    </div>

</section>
</body>
</html>
